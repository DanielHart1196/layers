<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layers</title>
    <script>
      try {
        const bootPosterImage = sessionStorage.getItem("atlas.bootViewportPoster");
        if (bootPosterImage) {
          document.documentElement.style.setProperty("--boot-stage-poster-image", `url("${bootPosterImage}")`);
        }

        const storedViewState = window.localStorage?.getItem("atlas.view.state");
        if (storedViewState) {
          const parsedViewState = JSON.parse(storedViewState);
          const zoom = Number(parsedViewState?.zoom);
          if (Number.isFinite(zoom) && zoom > 1.01) {
            document.documentElement.classList.add("is-mobile-boot-zoomed");
          }
        }
      } catch (error) {
        // Ignore storage access failures during boot.
      }

      if (window.matchMedia && window.matchMedia("(max-width: 800px)").matches) {
        document.documentElement.classList.add("is-mobile-default-globe");
        document.documentElement.style.setProperty("--boot-globe-width", `${Math.max(1, Math.round(window.innerWidth || 1200))}`);
        document.documentElement.style.setProperty("--boot-globe-height", `${Math.max(1, Math.round(window.innerHeight || 860))}`);
        document.documentElement.style.setProperty(
          "--boot-globe-radius",
          `${Math.max(120, Math.min(window.innerWidth || 1200, window.innerHeight || 860) / 2 - 44)}`,
        );
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3-geo-projection@4/dist/d3-geo-projection.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="./atlas-dymaxion.js"></script>
    <script src="./atlas-core.js"></script>
    <script src="./atlas-path-cache.js"></script>
    <script src="./atlas-adapters.js"></script>
    <script src="./atlas-earth.js"></script>
    <script src="./atlas-layers.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div
          class="atlas-stage"
          id="atlasStage"
          role="img"
          aria-label="Double hemisphere world map with north and south pole insets"
        >
          <div class="boot-stage-poster" aria-hidden="true"></div>
          <canvas
            class="atlas-canvas atlas-earth-canvas"
            id="atlasEarthCanvas"
            width="1200"
            height="860"
          ></canvas>
          <canvas
            class="atlas-canvas atlas-overlay-canvas"
            id="atlasOverlayCanvas"
            width="1200"
            height="860"
          ></canvas>
          <canvas
            class="atlas-canvas atlas-empire-canvas"
            id="atlasEmpireCanvas"
            width="1200"
            height="860"
          ></canvas>
          <svg
            class="atlas-overlay"
            viewBox="0 0 1200 860"
            aria-hidden="true"
          >
            <defs>
              <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow
                  dx="0"
                  dy="18"
                  stdDeviation="18"
                  flood-color="#001722"
                  flood-opacity="0.28"
                />
              </filter>
            </defs>

            <g class="atlas-shell" filter="url(#softShadow)">
              <circle class="frame frame-single-globe" data-frame="single-globe" cx="600" cy="430" r="320" />
              <circle class="frame frame-atlas" data-frame="atlas-0" cx="310" cy="430" r="290" />
              <circle class="frame frame-atlas" data-frame="atlas-1" cx="890" cy="430" r="290" />
              <circle class="frame frame-atlas" data-frame="atlas-2" cx="600" cy="140" r="120" />
              <circle class="frame frame-atlas" data-frame="atlas-3" cx="600" cy="720" r="120" />
              <rect class="frame frame-dymaxion" x="70" y="90" width="1060" height="680" rx="26" ry="26" />
            </g>
          </svg>
          <script>
            if (document.documentElement.classList.contains("is-mobile-default-globe")) {
              const bootWidth = Number.parseFloat(document.documentElement.style.getPropertyValue("--boot-globe-width")) || 1200;
              const bootHeight = Number.parseFloat(document.documentElement.style.getPropertyValue("--boot-globe-height")) || 860;
              const bootRadius = Number.parseFloat(document.documentElement.style.getPropertyValue("--boot-globe-radius")) || 320;
              const bootOverlay = document.currentScript.previousElementSibling;
              const bootFrame = bootOverlay?.querySelector?.("[data-frame='single-globe']");
              if (bootOverlay instanceof SVGElement && bootFrame instanceof SVGCircleElement) {
                bootOverlay.setAttribute("viewBox", `0 0 ${bootWidth} ${bootHeight}`);
                bootFrame.setAttribute("cx", String(bootWidth / 2));
                bootFrame.setAttribute("cy", String(bootHeight / 2));
                bootFrame.setAttribute("r", String(bootRadius));
              }
            }
          </script>

        </div>

        <button
          class="month-menu-toggle"
          id="monthMenuToggle"
          type="button"
          aria-label="Open month selector"
          aria-controls="monthOverlay"
          aria-expanded="false"
        >
          <svg class="month-menu-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M7 3h10v4.5l-3.15 3.15v2.45L16.6 16v5H7.4v-5l2.75-2.9v-2.45L7 7.5V3Z"
            />
          </svg>
        </button>
        <div class="month-trigger" aria-hidden="true"></div>
        <div class="month-overlay" id="monthOverlay" aria-label="Month control">
          <div class="month-slider" id="monthSlider" role="listbox" aria-label="Select month">
            <button class="month-chip" data-month="01" type="button">01</button>
            <button class="month-chip" data-month="02" type="button">02</button>
            <button class="month-chip" data-month="03" type="button">03</button>
            <button class="month-chip" data-month="04" type="button">04</button>
            <button class="month-chip" data-month="05" type="button">05</button>
            <button class="month-chip" data-month="06" type="button">06</button>
            <button class="month-chip" data-month="07" type="button">07</button>
            <button class="month-chip" data-month="08" type="button">08</button>
            <button class="month-chip" data-month="09" type="button">09</button>
            <button class="month-chip" data-month="10" type="button">10</button>
            <button class="month-chip" data-month="11" type="button">11</button>
            <button class="month-chip" data-month="12" type="button">12</button>
          </div>
        </div>

        <div class="layer-trigger" aria-hidden="true"></div>
        <button
          class="layer-menu-toggle"
          id="layerMenuToggle"
          type="button"
          aria-label="Open layers menu"
          aria-controls="layerPanel"
          aria-expanded="false"
        >
          <span class="layer-menu-toggle-bar"></span>
          <span class="layer-menu-toggle-bar"></span>
          <span class="layer-menu-toggle-bar"></span>
        </button>
        <div class="mobile-refresh" id="mobileRefresh">
          <button
            class="mobile-refresh-button"
            id="mobileRefreshButton"
            type="button"
            aria-label="Refresh page"
            aria-expanded="false"
            aria-controls="mobileRefreshMenu"
          >
            <span class="mobile-refresh-icon" aria-hidden="true"></span>
          </button>
          <div class="mobile-refresh-menu" id="mobileRefreshMenu" role="menu" aria-label="Reload options">
            <button class="mobile-refresh-menu-item" id="hardReloadButton" type="button" role="menuitem">
              Hard reload
            </button>
            <button class="mobile-refresh-menu-item" id="clearCacheReloadButton" type="button" role="menuitem">
              Clear cache reload
            </button>
          </div>
        </div>
        <div
          class="projection-switcher"
          id="projectionSwitcher"
          role="button"
          tabindex="0"
          aria-label="Current projection. Swipe to change projection"
        >
          <svg class="projection-switcher-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="8.25"></circle>
            <ellipse cx="12" cy="12" rx="3.75" ry="8.25"></ellipse>
            <path d="M3.75 12h16.5"></path>
            <path d="M5.5 8.5c2.1 1.05 4.3 1.55 6.5 1.55s4.4-.5 6.5-1.55"></path>
            <path d="M5.5 15.5c2.1-1.05 4.3-1.55 6.5-1.55s4.4.5 6.5 1.55"></path>
          </svg>
          <span class="projection-switcher-track" id="projectionSwitcherTrack">
            <span class="projection-switcher-label projection-switcher-boot-label" aria-hidden="true">Globe</span>
          </span>
        </div>
        <aside class="layer-panel" id="layerPanel" aria-label="Map layers">
          <div class="layer-panel-header">
            <p class="panel-eyebrow">Layers</p>
            <button class="layer-panel-close" id="layerPanelClose" type="button" aria-label="Close layers menu">
              <span></span>
              <span></span>
            </button>
          </div>
          <div class="layer-panel-scroll">
            <div class="layer-list">
              <section class="layer-group layer-group-borders layer-group-earth is-active" id="earthLayerGroup">
                <div class="layer-group-head">
                  <button class="layer-item layer-item-group is-active" id="earthGroupButton" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Earth</strong>
                    </span>
                    <span
                      class="layer-group-toggle"
                      id="earthGroupToggle"
                      aria-label="Toggle earth controls"
                      aria-controls="earthLayerControls"
                      aria-expanded="false"
                    >
                      <span class="layer-group-chevron" aria-hidden="true"></span>
                    </span>
                  </button>
                </div>
                <div class="layer-sublist layer-sublist-controls" id="earthLayerControls">
                  <div class="layer-control layer-control-color">
                    <div class="layer-control-copy">
                      <strong>Land Color</strong>
                      <small id="landColorValue">#98B977</small>
                      <span class="layer-inline-color-dot" id="landColorInlineDot" aria-hidden="true"></span>
                    </div>
                    <div class="layer-color-swatch-scroll">
                      <div class="layer-color-swatch-row" id="landColorSwatchRow" aria-label="Land color presets">
                        <button
                          class="layer-inline-color-button layer-inline-color-button-plus"
                          id="landColorSwatchButton"
                          type="button"
                          aria-label="Open custom land color picker"
                          aria-expanded="false"
                        >
                          <span class="layer-inline-color-plus" aria-hidden="true">+</span>
                        </button>
                        <div class="layer-inline-color-customs" id="landColorCustoms"></div>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#FFFFFF" aria-label="White"><span class="layer-inline-color-dot" style="--layer-active-color:#FFFFFF;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#0F2430" aria-label="Black"><span class="layer-inline-color-dot" style="--layer-active-color:#0F2430;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#D94B4B" aria-label="Red"><span class="layer-inline-color-dot" style="--layer-active-color:#D94B4B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#E58A2B" aria-label="Orange"><span class="layer-inline-color-dot" style="--layer-active-color:#E58A2B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#E5C84A" aria-label="Yellow"><span class="layer-inline-color-dot" style="--layer-active-color:#E5C84A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#5B8C5A" aria-label="Green"><span class="layer-inline-color-dot" style="--layer-active-color:#5B8C5A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#4B6ED9" aria-label="Blue"><span class="layer-inline-color-dot" style="--layer-active-color:#4B6ED9;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-land-color="#8C5BD6" aria-label="Purple"><span class="layer-inline-color-dot" style="--layer-active-color:#8C5BD6;" aria-hidden="true"></span></button>
                      </div>
                    </div>
                    <div class="layer-color-panel" id="landColorPanel" aria-hidden="true">
                      <div class="layer-color-field" id="landColorField" role="application" aria-label="Land color gradient field">
                        <span class="layer-color-field-handle" id="landColorFieldHandle" aria-hidden="true"></span>
                      </div>
                      <div class="layer-color-hue-slider" id="landColorHueSlider" role="slider" aria-label="Land hue slider">
                        <span class="layer-color-hue-handle" id="landColorHueHandle" aria-hidden="true"></span>
                      </div>
                      <div class="layer-color-input-row">
                        <input
                          class="layer-hex-input"
                          id="landColorInput"
                          type="text"
                          inputmode="text"
                          autocapitalize="characters"
                          autocomplete="off"
                          spellcheck="false"
                          value="#98B977"
                          aria-label="Land color hex code"
                        />
                        <button class="layer-color-add-button" id="landColorAddButton" type="button">
                          Add
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="layer-control layer-control-color">
                    <div class="layer-control-copy">
                      <strong>Water Color</strong>
                      <small id="waterColorValue">#2F7398</small>
                      <span class="layer-inline-color-dot" id="waterColorInlineDot" aria-hidden="true"></span>
                    </div>
                    <div class="layer-color-swatch-scroll">
                      <div class="layer-color-swatch-row" id="waterColorSwatchRow" aria-label="Water color presets">
                        <button
                          class="layer-inline-color-button layer-inline-color-button-plus"
                          id="waterColorSwatchButton"
                          type="button"
                          aria-label="Open custom water color picker"
                          aria-expanded="false"
                        >
                          <span class="layer-inline-color-plus" aria-hidden="true">+</span>
                        </button>
                        <div class="layer-inline-color-customs" id="waterColorCustoms"></div>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#FFFFFF" aria-label="White"><span class="layer-inline-color-dot" style="--layer-active-color:#FFFFFF;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#0F2430" aria-label="Black"><span class="layer-inline-color-dot" style="--layer-active-color:#0F2430;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#D94B4B" aria-label="Red"><span class="layer-inline-color-dot" style="--layer-active-color:#D94B4B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#E58A2B" aria-label="Orange"><span class="layer-inline-color-dot" style="--layer-active-color:#E58A2B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#E5C84A" aria-label="Yellow"><span class="layer-inline-color-dot" style="--layer-active-color:#E5C84A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#5B8C5A" aria-label="Green"><span class="layer-inline-color-dot" style="--layer-active-color:#5B8C5A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#4B6ED9" aria-label="Blue"><span class="layer-inline-color-dot" style="--layer-active-color:#4B6ED9;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-water-color="#8C5BD6" aria-label="Purple"><span class="layer-inline-color-dot" style="--layer-active-color:#8C5BD6;" aria-hidden="true"></span></button>
                      </div>
                    </div>
                    <div class="layer-color-panel" id="waterColorPanel" aria-hidden="true">
                      <div class="layer-color-field" id="waterColorField" role="application" aria-label="Water color gradient field">
                        <span class="layer-color-field-handle" id="waterColorFieldHandle" aria-hidden="true"></span>
                      </div>
                      <div class="layer-color-hue-slider" id="waterColorHueSlider" role="slider" aria-label="Water hue slider">
                        <span class="layer-color-hue-handle" id="waterColorHueHandle" aria-hidden="true"></span>
                      </div>
                      <div class="layer-color-input-row">
                        <input
                          class="layer-hex-input"
                          id="waterColorInput"
                          type="text"
                          inputmode="text"
                          autocapitalize="characters"
                          autocomplete="off"
                          spellcheck="false"
                          value="#2F7398"
                          aria-label="Water color hex code"
                        />
                        <button class="layer-color-add-button" id="waterColorAddButton" type="button">
                          Add
                        </button>
                      </div>
                    </div>
                  </div>
                  <section class="projection-panel" aria-label="Projection">
                    <p class="projection-label">Projection</p>
                    <div class="projection-picker" id="projectionPicker">
                      <button
                        class="projection-picker-button"
                        id="projectionPickerButton"
                        type="button"
                        aria-label="Choose projection"
                        aria-controls="projectionPickerList"
                        aria-expanded="false"
                      >
                        <span class="projection-picker-value" id="projectionPickerValue">Globe</span>
                        <span class="projection-picker-chevron" aria-hidden="true"></span>
                      </button>
                      <div class="projection-picker-list" id="projectionPickerList" role="listbox" aria-label="Map projection">
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="orthographic">Globe</button>
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="azimuthal-equidistant">Azimuthal Eqd</button>
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="mercator">Mercator</button>
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="natural-earth-ii">Natural Earth II</button>
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="goode-homolosine">Goode Homolosine</button>
                        <button class="projection-picker-option" type="button" role="option" data-projection-option="waterman">Waterman Butterfly</button>
                      </div>
                    </div>
                  </section>
                  <section class="layer-group layer-group-borders" id="graticuleLayerGroup">
                    <div class="layer-group-head">
                      <button class="layer-item layer-item-group is-active" data-layer-id="graticule" type="button">
                        <span class="layer-checkbox" aria-hidden="true">
                          <span class="layer-checkmark"></span>
                        </span>
                        <span class="layer-copy">
                          <strong>Graticule</strong>
                          <small>Latitude and longitude grid</small>
                        </span>
                        <span
                          class="layer-group-toggle"
                          id="graticuleGroupToggle"
                          aria-label="Toggle graticule controls"
                          aria-controls="graticuleLayerControls"
                          aria-expanded="false"
                        >
                          <span class="layer-group-chevron" aria-hidden="true"></span>
                        </span>
                      </button>
                    </div>
                    <div class="layer-sublist layer-sublist-controls" id="graticuleLayerControls">
                      <label class="layer-control" for="graticuleWidthInput">
                        <span class="layer-control-copy">
                          <strong>Stroke Width</strong>
                          <small id="graticuleWidthValue">0.7 px</small>
                        </span>
                        <input
                          class="layer-range-input"
                          id="graticuleWidthInput"
                          type="range"
                          min="0.4"
                          max="3"
                          step="0.1"
                          value="0.7"
                        />
                      </label>
                      <div class="layer-control layer-control-color">
                        <div class="layer-control-copy">
                          <strong>Line Color</strong>
                          <small id="graticuleColorValue">#FFFFFF</small>
                          <span class="layer-inline-color-dot" id="graticuleColorInlineDot" aria-hidden="true"></span>
                        </div>
                        <div class="layer-color-swatch-scroll">
                          <div class="layer-color-swatch-row" id="graticuleColorSwatchRow" aria-label="Graticule color presets">
                            <button
                              class="layer-inline-color-button layer-inline-color-button-plus"
                              id="graticuleColorSwatchButton"
                              type="button"
                              aria-label="Open graticule color selector"
                              aria-controls="graticuleColorPanel"
                              aria-expanded="false"
                            >
                              <span class="layer-inline-color-plus" aria-hidden="true">+</span>
                            </button>
                            <div class="layer-inline-color-customs" id="graticuleColorCustoms"></div>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#FFFFFF" aria-label="Choose white graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#FFFFFF"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#000000" aria-label="Choose black graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#000000"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#D9534F" aria-label="Choose red graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#D9534F"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#E59A3E" aria-label="Choose orange graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#E59A3E"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#E6CF58" aria-label="Choose yellow graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#E6CF58"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#63A66A" aria-label="Choose green graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#63A66A"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#1F3B57" aria-label="Choose blue graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#1F3B57"></span></button>
                            <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-graticule-color="#7A58A6" aria-label="Choose purple graticule color"><span class="layer-inline-color-dot" style="--layer-active-color:#7A58A6"></span></button>
                          </div>
                        </div>
                        <div class="layer-opacity-control">
                          <label class="layer-opacity-label" for="graticuleOpacityInput">Opacity</label>
                          <input
                            class="layer-opacity-range"
                            id="graticuleOpacityInput"
                            type="range"
                            min="0"
                            max="100"
                            step="1"
                            value="12"
                          />
                        </div>
                        <div class="layer-color-panel" id="graticuleColorPanel" aria-hidden="true">
                          <div class="layer-color-field" id="graticuleColorField" role="application" aria-label="Graticule color gradient field">
                            <span class="layer-color-field-handle" id="graticuleColorFieldHandle" aria-hidden="true"></span>
                          </div>
                          <div class="layer-color-hue-slider" id="graticuleColorHueSlider" role="slider" aria-label="Graticule color hue slider" aria-valuemin="0" aria-valuemax="360">
                            <span class="layer-color-hue-handle" id="graticuleColorHueHandle" aria-hidden="true"></span>
                          </div>
                          <div class="layer-color-input-row">
                            <input
                              class="layer-hex-input"
                              id="graticuleColorInput"
                              type="text"
                              inputmode="text"
                              autocomplete="off"
                              spellcheck="false"
                              value="#FFFFFF"
                              aria-label="Graticule line hex color"
                            />
                            <button class="layer-color-add-button" id="graticuleColorAddButton" type="button">
                              Add
                            </button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>
                  <button class="layer-item layer-item-sub" data-layer-id="tissot" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Tissot Indicatrix</strong>
                      <small>Projection distortion circles</small>
                    </span>
                  </button>
                </div>
              </section>

              <section class="layer-group layer-group-earth is-active">
                <button class="layer-item is-active" data-layer-id="earth" type="button">
                  <span class="layer-checkbox" aria-hidden="true">
                    <span class="layer-checkmark"></span>
                  </span>
                  <span class="layer-copy">
                    <strong>Satellite</strong>
                    <small>Monthly imagery overlay</small>
                  </span>
                </button>
              </section>

              <section class="layer-group layer-group-borders" id="borderLayerGroup">
                <div class="layer-group-head">
                  <button class="layer-item layer-item-group is-active" data-layer-id="borders" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Borders</strong>
                      <small>Country outlines</small>
                    </span>
                    <span
                      class="layer-group-toggle"
                      id="borderGroupToggle"
                      aria-label="Toggle border controls"
                      aria-controls="borderLayerControls"
                      aria-expanded="false"
                    >
                      <span class="layer-group-chevron" aria-hidden="true"></span>
                    </span>
                  </button>
                </div>
                <div class="layer-sublist layer-sublist-controls" id="borderLayerControls">
                  <label class="layer-control" for="borderWidthInput">
                    <span class="layer-control-copy">
                      <strong>Stroke Width</strong>
                      <small id="borderWidthValue">0.8 px</small>
                    </span>
                    <input
                      class="layer-range-input"
                      id="borderWidthInput"
                      type="range"
                      min="0.4"
                      max="3"
                      step="0.1"
                      value="0.8"
                    />
                  </label>
                  <div class="layer-control layer-control-color">
                    <div class="layer-control-copy">
                      <strong>Line Color</strong>
                      <small id="borderColorValue">#FFFFFF</small>
                      <span class="layer-inline-color-dot" id="borderColorInlineDot" aria-hidden="true"></span>
                    </div>
                    <div class="layer-color-swatch-scroll">
                      <div class="layer-color-swatch-row" id="borderColorSwatchRow" aria-label="Border color presets">
                        <button
                          class="layer-inline-color-button layer-inline-color-button-plus"
                          id="borderColorSwatchButton"
                          type="button"
                          aria-label="Open custom border color picker"
                          aria-controls="borderColorModal"
                          aria-expanded="false"
                        >
                          <span class="layer-inline-color-plus" aria-hidden="true">+</span>
                        </button>
                        <div class="layer-inline-color-customs" id="borderColorCustoms"></div>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#FFFFFF" aria-label="White"><span class="layer-inline-color-dot" style="--layer-active-color:#FFFFFF;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#0F2430" aria-label="Black"><span class="layer-inline-color-dot" style="--layer-active-color:#0F2430;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#D94B4B" aria-label="Red"><span class="layer-inline-color-dot" style="--layer-active-color:#D94B4B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#E58A2B" aria-label="Orange"><span class="layer-inline-color-dot" style="--layer-active-color:#E58A2B;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#E5C84A" aria-label="Yellow"><span class="layer-inline-color-dot" style="--layer-active-color:#E5C84A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#5B8C5A" aria-label="Green"><span class="layer-inline-color-dot" style="--layer-active-color:#5B8C5A;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#4B6ED9" aria-label="Blue"><span class="layer-inline-color-dot" style="--layer-active-color:#4B6ED9;" aria-hidden="true"></span></button>
                        <button class="layer-inline-color-button layer-inline-color-choice" type="button" data-border-color="#8C5BD6" aria-label="Purple"><span class="layer-inline-color-dot" style="--layer-active-color:#8C5BD6;" aria-hidden="true"></span></button>
                      </div>
                    </div>
                    <div class="layer-opacity-control">
                      <label class="layer-opacity-label" for="borderOpacityInput">Opacity</label>
                      <input
                        class="layer-opacity-range"
                        id="borderOpacityInput"
                        type="range"
                        min="0"
                        max="100"
                        step="1"
                        value="36"
                      />
                    </div>
                    <div class="layer-color-panel" id="borderColorPanel" aria-hidden="true">
                      <div
                        class="layer-color-field"
                        id="borderColorField"
                        role="application"
                        aria-label="Border color gradient field"
                      >
                        <span class="layer-color-field-handle" id="borderColorFieldHandle" aria-hidden="true"></span>
                      </div>
                      <div
                        class="layer-color-hue-slider"
                        id="borderColorHueSlider"
                        role="slider"
                        aria-label="Border hue slider"
                      >
                        <span class="layer-color-hue-handle" id="borderColorHueHandle" aria-hidden="true"></span>
                      </div>
                      <div class="layer-color-input-row">
                        <input
                          class="layer-hex-input"
                          id="borderColorInput"
                          type="text"
                          inputmode="text"
                          autocapitalize="characters"
                          autocomplete="off"
                          spellcheck="false"
                          value="#FFFFFF"
                          aria-label="Border line color hex code"
                        />
                        <button class="layer-color-add-button" id="borderColorAddButton" type="button">
                          Add
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              </section>
              <section class="layer-group layer-group-empires" id="empireLayerGroup">
                <div class="layer-group-head">
                  <button class="layer-item layer-item-group" data-layer-id="empires" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Empires</strong>
                      <small>Peak territorial extent</small>
                    </span>
                    <span
                      class="layer-group-toggle"
                      id="empireGroupToggle"
                      aria-label="Toggle empire sublayers"
                      aria-controls="empireSubLayers"
                      aria-expanded="false"
                    >
                      <span class="layer-group-chevron" aria-hidden="true"></span>
                    </span>
                  </button>
                </div>
                <div class="layer-sublist" id="empireSubLayers">
                  <button class="layer-item layer-item-sub" data-empire-layer-id="roman" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Roman</strong>
                      <small>AD 117 extent</small>
                    </span>
                  </button>
                  <button class="layer-item layer-item-sub" data-empire-layer-id="romanComparison" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Roman ArcGIS</strong>
                      <small>Comparison source</small>
                    </span>
                  </button>
                  <button class="layer-item layer-item-sub" data-empire-layer-id="mongol" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>Mongol</strong>
                      <small>1279 extent</small>
                    </span>
                  </button>
                  <button class="layer-item layer-item-sub" data-empire-layer-id="british" type="button">
                    <span class="layer-checkbox" aria-hidden="true">
                      <span class="layer-checkmark"></span>
                    </span>
                    <span class="layer-copy">
                      <strong>British</strong>
                      <small>1921 extent</small>
                    </span>
                  </button>
                </div>
              </section>
            </div>
          </div>
          <div class="layer-panel-scrollbar" id="layerPanelScrollbar" aria-hidden="true">
            <div class="layer-panel-scrollbar-thumb" id="layerPanelScrollbarThumb"></div>
          </div>
        </aside>
      </section>
    </main>
    <script src="./countries.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
